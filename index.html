<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner UI</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
        }
        
        .sidebar {
            width: 260px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .sidebar.collapsed {
            width: 0;
            border-right: none;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 260px;
        }
        .sidebar-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 0 5px;
        }
        
        .list-headers {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
            min-width: 260px;
        }
        .lh-col { flex: 1; user-select: none; }
        .lh-col:first-child { flex: 1; text-align: left; }
        .lh-col.text-right { text-align: right; flex: 0 0 70px; }
        .sort-arrow { display: inline-block; width: 10px; font-size: 12px; color: var(--accent); }
        
        .coin-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 5px 5px 10px;
            min-width: 260px;
        }
        
        .coin-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            gap: 15px; 
        }
        .coin-name { font-weight: bold; font-size: 14px; }
        
        .coin-price { font-size: 14px; font-weight: bold; color: var(--text-main); }
        .coin-change { font-size: 11px; font-weight: normal; margin-top: 3px; }
        .coin-change.up { color: var(--success); }
        .coin-change.down { color: var(--danger); }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .top-bar {
            padding: 10px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toggle-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .table-container {
            flex: 1;
            overflow: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }
        th, td {
            padding: 10px 6px;
            text-align: right;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        th:first-child, td:first-child { 
            text-align: left; 
            position: sticky; 
            left: 0; 
            background-color: var(--bg-dark); 
            z-index: 1; 
        }
        th {
            background-color: var(--bg-panel);
            color: var(--text-muted);
            font-weight: normal;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        th:first-child { z-index: 3; background-color: var(--bg-panel); }
        
        .highlight {
            background-color: rgba(239, 68, 68, 0.15);
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { background-color: rgba(239, 68, 68, 0.1); }
            to { background-color: rgba(239, 68, 68, 0.25); }
        }
        
        .score { padding: 3px 5px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .s-danger { background: var(--danger); color: white; }
        .s-warn { background: var(--warning); color: white; }
        .s-safe { background: var(--success); color: white; }
        
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                width: 260px;
                transform: translateX(0);
                box-shadow: 5px 0 20px rgba(0,0,0,0.5);
            }
            .sidebar.collapsed {
                width: 260px; 
                transform: translateX(-100%);
                box-shadow: none;
            }
            th, td {
                padding: 12px 6px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar / Kiri -->
    <div class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-top">
                <strong>Pilih Koin <span id="ws-status" style="font-size:10px; margin-left: 5px;">🔴</span></strong>
                <button class="close-btn" onclick="toggleSidebar()">✕</button>
            </div>
            <button class="toggle-btn" style="background-color: var(--success); width: 100%;" onclick="startScan()">🚀 Mulai Scan</button>
        </div>
        
        <div class="list-headers">
            <div class="lh-col" onclick="handleSort('vol')">Pair <span class="sort-arrow" id="arrow-vol">▾</span></div>
            <div class="lh-col text-right" onclick="handleSort('change')">24h% <span class="sort-arrow" id="arrow-change"></span></div>
        </div>

        <div class="coin-list" id="coin-list-container">
            <div style="padding: 10px; color: var(--text-muted); text-align: center;">Memuat koin...</div>
        </div>
    </div>

    <!-- Main Content / Kanan -->
    <div class="main-content">
        <div class="top-bar">
            <button class="toggle-btn" onclick="toggleSidebar()">☰ Koin</button>
            <span id="status-text" style="color: var(--text-muted); font-size: 13px;">Memantau 0 Koin</span>
            <span id="radar-status" style="font-size:10px; margin-left: 5px;"></span>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Pair</th>
                        <th>Harga</th>
                        <th>Spike</th>
                        <th>RSI</th>
                        <th>B/S</th>
                        <th>Skor</th>
                    </tr>
                </thead>
                <tbody id="dashboard-body">
                    <tr>
                        <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 20px;">
                            Centang koin di panel kiri lalu klik "Mulai Scan"
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const REST_URL = 'https://fapi.binance.com/fapi/v1/ticker/24hr';
        let allCoins = [];
        let selectedCoins = new Set();
        let listWs = null;

        let currentSortCol = 'vol';
        let currentSortDir = 'desc'; 

        function formatPrice(p) {
            const num = parseFloat(p);
            if (num < 0.1) return num.toFixed(5);
            if (num < 10) return num.toFixed(3);
            return num.toLocaleString('en-US'); 
        }

        async function fetchCoins() {
            try {
                const response = await fetch(REST_URL);
                const data = await response.json();
                allCoins = data.filter(c => c.symbol.endsWith('USDT') && !c.symbol.includes('_'));
                updateSortUI();
                sortCoins();
                startListWebsocket();
            } catch (error) {
                console.error("Gagal mengambil data koin:", error);
            }
        }

        function handleSort(col) {
            if (currentSortCol === col) {
                currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
            } else {
                currentSortCol = col;
                currentSortDir = 'desc'; 
            }
            updateSortUI();
            sortCoins();
        }

        function updateSortUI() {
            document.getElementById('arrow-vol').innerText = '';
            document.getElementById('arrow-change').innerText = '';
            
            const arrow = currentSortDir === 'desc' ? '▾' : '▴';
            const arrowEl = document.getElementById(`arrow-${currentSortCol}`);
            if (arrowEl) arrowEl.innerText = arrow;
        }

        function sortCoins() {
            if (currentSortCol === 'vol') {
                allCoins.sort((a, b) => currentSortDir === 'desc' 
                    ? parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume)
                    : parseFloat(a.quoteVolume) - parseFloat(b.quoteVolume));
            } else if (currentSortCol === 'change') {
                allCoins.sort((a, b) => currentSortDir === 'desc' 
                    ? parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent)
                    : parseFloat(a.priceChangePercent) - parseFloat(b.priceChangePercent));
            }
            renderCoinList();
        }

        function renderCoinList() {
            const container = document.getElementById('coin-list-container');
            container.innerHTML = '';
            
            allCoins.forEach(coin => {
                const name = coin.symbol.replace('USDT', '');
                const change = parseFloat(coin.priceChangePercent);
                const changeClass = change >= 0 ? 'up' : 'down';
                const changeSign = change >= 0 ? '+' : '';
                const isChecked = selectedCoins.has(coin.symbol) ? 'checked' : '';
                const price = formatPrice(coin.lastPrice);

                const label = document.createElement('label');
                label.className = 'coin-item';
                label.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px; width: 100px;">
                        <input type="checkbox" value="${coin.symbol}" ${isChecked} onchange="toggleCoinSelection(this)"> 
                        <span class="coin-name">${name}</span>
                    </div>
                    <div style="text-align: right; flex: 1;">
                        <div class="coin-price" id="price-${coin.symbol}">${price}</div>
                        <div class="coin-change ${changeClass}" id="change-${coin.symbol}">${changeSign}${change.toFixed(2)}%</div>
                    </div>
                `;
                container.appendChild(label);
            });
        }

        function startListWebsocket() {
            if (listWs) listWs.close();
            listWs = new WebSocket('wss://fstream.binance.com/stream?streams=!ticker@arr');
            
            listWs.onopen = () => {
                document.getElementById('ws-status').innerText = '🟢';
                document.getElementById('ws-status').title = 'Realtime Aktif';
            };

            listWs.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (!msg.data) return;
                
                msg.data.forEach(ticker => {
                    const symbol = ticker.s;
                    const changeEl = document.getElementById(`change-${symbol}`);
                    const priceEl = document.getElementById(`price-${symbol}`);
                    
                    if (changeEl && priceEl) {
                        const change = parseFloat(ticker.P);
                        const changeClass = change >= 0 ? 'up' : 'down';
                        const changeSign = change >= 0 ? '+' : '';
                        
                        changeEl.className = `coin-change ${changeClass}`;
                        changeEl.innerText = `${changeSign}${change.toFixed(2)}%`;
                        priceEl.innerText = `${formatPrice(ticker.c)}`;
                    }
                });
            };
            
            listWs.onerror = (e) => {
                console.log("WS List Error", e);
                document.getElementById('ws-status').innerText = '🔴';
            };
            listWs.onclose = () => {
                document.getElementById('ws-status').innerText = '🔴';
                setTimeout(startListWebsocket, 3000);
            };
        }

        function toggleCoinSelection(checkbox) {
            if (checkbox.checked) {
                selectedCoins.add(checkbox.value);
            } else {
                selectedCoins.delete(checkbox.value);
            }
            document.getElementById('status-text').innerText = `Memilih ${selectedCoins.size} Koin`;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        let scannedData = {}; 
        let radarWs = null;

        async function startScan() {
            if (selectedCoins.size === 0) {
                alert("Centang minimal 1 koin dulu!");
                return;
            }
            
            const tbody = document.getElementById('dashboard-body');
            tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 20px;">Menarik data histori untuk ${selectedCoins.size} koin...</td></tr>`;
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('collapsed');
            }

            scannedData = {}; 
            if (radarWs) radarWs.close();
            document.getElementById('radar-status').innerText = '🔴';
            
            for (let symbol of selectedCoins) {
                try {
                    const res = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1m&limit=50`);
                    const klines = await res.json();
                    
                    const closes = klines.map(k => parseFloat(k[4]));
                    const volumes = klines.map(k => parseFloat(k[5]));
                    const takerBuys = klines.map(k => parseFloat(k[9]));
                    
                    const rsi = calculateRSI(closes);
                    const volSpike = calculateVolSpike(volumes);
                    const bsRatio = calculateBSRatio(volumes[volumes.length-1], takerBuys[takerBuys.length-1]);
                    
                    const lastPrice = closes[closes.length-1];
                    const score = calculateScore(rsi, volSpike, bsRatio);
                    
                    scannedData[symbol] = { 
                        symbol, price: lastPrice, rsi, volSpike, bsRatio, score,
                        closes, volumes, takerBuys, lastKlineTime: klines[klines.length-1][0]
                    };
                    
                    await new Promise(r => setTimeout(r, 100)); 
                } catch(e) {
                    console.error("Gagal tarik kline", symbol, e);
                }
            }
            
            renderDashboard();
            startRadarWebsocket();
        }

        function startRadarWebsocket() {
            if (radarWs) radarWs.close();
            const streams = Array.from(selectedCoins).map(sym => `${sym.toLowerCase()}@kline_1m`);
            if (streams.length === 0) return;
            
            const wsUrl = `wss://fstream.binance.com/stream?streams=${streams.join('/')}`;
            radarWs = new WebSocket(wsUrl);
            
            radarWs.onopen = () => {
                document.getElementById('radar-status').innerText = '🟢';
            };

            radarWs.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (!msg.data || !msg.data.k) return;
                
                const kline = msg.data.k;
                const symbol = kline.s;
                const data = scannedData[symbol];
                if (!data) return;
                
                const closePrice = parseFloat(kline.c);
                const volume = parseFloat(kline.v);
                const tbVol = parseFloat(kline.V); 
                
                if (kline.t === data.lastKlineTime) {
                    data.closes[data.closes.length - 1] = closePrice;
                    data.volumes[data.volumes.length - 1] = volume;
                    data.takerBuys[data.takerBuys.length - 1] = tbVol;
                } else if (kline.t > data.lastKlineTime) {
                    data.closes.push(closePrice);
                    data.volumes.push(volume);
                    data.takerBuys.push(tbVol);
                    
                    if (data.closes.length > 50) {
                        data.closes.shift();
                        data.volumes.shift();
                        data.takerBuys.shift();
                    }
                    data.lastKlineTime = kline.t;
                }
                
                data.price = closePrice;
                data.rsi = calculateRSI(data.closes);
                data.volSpike = calculateVolSpike(data.volumes);
                data.bsRatio = calculateBSRatio(data.volumes[data.volumes.length - 1], data.takerBuys[data.takerBuys.length - 1]);
                data.score = calculateScore(data.rsi, data.volSpike, data.bsRatio);
                
                renderDashboard();
            };

            radarWs.onerror = (e) => {
                console.log("Radar WS Error", e);
                document.getElementById('radar-status').innerText = '🔴';
            };
            radarWs.onclose = () => {
                document.getElementById('radar-status').innerText = '🔴';
                setTimeout(startRadarWebsocket, 3000);
            };
        }

        function calculateRSI(closes, period = 14) {
            if (closes.length <= period) return 50;
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                const diff = closes[i] - closes[i - 1];
                if (diff > 0) gains += diff;
                else losses -= diff;
            }
            let avgGain = gains / period;
            let avgLoss = losses / period;
            
            for (let i = period + 1; i < closes.length; i++) {
                const diff = closes[i] - closes[i - 1];
                const gain = diff > 0 ? diff : 0;
                const loss = diff < 0 ? -diff : 0;
                avgGain = (avgGain * (period - 1) + gain) / period;
                avgLoss = (avgLoss * (period - 1) + loss) / period;
            }
            
            if (avgLoss === 0) return 100;
            return 100 - (100 / (1 + (avgGain / avgLoss)));
        }

        function calculateVolSpike(volumes) {
            if (volumes.length < 21) return 0;
            const currentVol = volumes[volumes.length - 1];
            const prevVols = volumes.slice(-21, -1);
            const avgVol = prevVols.reduce((a, b) => a + b, 0) / prevVols.length;
            if (avgVol === 0) return 0;
            return ((currentVol / avgVol) * 100) - 100;
        }

        function calculateBSRatio(totalVol, takerBuyVol) {
            if (totalVol === 0) return 1;
            const sellerVol = totalVol - takerBuyVol;
            if (sellerVol <= 0) return 9.99;
            return takerBuyVol / sellerVol;
        }
        
        function calculateScore(rsi, spike, bs) {
            let score = 0;
            if (rsi > 70) score += 1;
            if (rsi > 85) score += 1;
            if (spike > 200) score += 1; 
            if (bs < 0.8) score += 1; 
            return score; 
        }

        // Metode render tanpa throttle, cukup mengubah isi node spesifik 
        // sehingga UI bisa terupdate belasan kali sedetik tanpa CPU berat atau berkedip jelek
        function renderDashboard() {
            const tbody = document.getElementById('dashboard-body');
            const sorted = Object.values(scannedData).sort((a,b) => b.score - a.score || b.volSpike - a.volSpike);
            
            if (sorted.length === 0) return;

            if (tbody.children.length !== sorted.length || tbody.innerHTML.includes('Menarik data')) {
                let html = '';
                sorted.forEach(data => {
                    html += `<tr id="row-${data.symbol}">
                        <td class="col-pair"></td>
                        <td class="col-price"></td>
                        <td class="col-spike"></td>
                        <td class="col-rsi"></td>
                        <td class="col-bs"></td>
                        <td class="col-score"></td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            }

            sorted.forEach((data, index) => {
                const tr = document.getElementById(`row-${data.symbol}`);
                if (!tr) return;
                
                // Urutkan ulang node DOM secara real-time jika posisi rankingnya berubah
                if (tbody.children[index] !== tr) {
                    tbody.insertBefore(tr, tbody.children[index]);
                }
                
                let rowClass = data.score >= 3 ? 'highlight' : '';
                tr.className = rowClass;
                
                let scoreClass = 's-safe';
                if (data.score === 2) scoreClass = 's-warn';
                if (data.score >= 3) scoreClass = 's-danger';

                tr.querySelector('.col-pair').innerHTML = `<strong>${data.symbol.replace('USDT','')}</strong>`;
                tr.querySelector('.col-price').innerHTML = `${formatPrice(data.price)}`; // TANPA $
                
                const spikeCol = tr.querySelector('.col-spike');
                spikeCol.style.color = data.volSpike > 100 ? 'var(--danger)' : 'var(--text-main)';
                spikeCol.innerText = `${data.volSpike > 0 ? '+' : ''}${data.volSpike.toFixed(0)}%`;
                
                const rsiCol = tr.querySelector('.col-rsi');
                rsiCol.style.color = data.rsi > 70 ? 'var(--danger)' : 'var(--text-main)';
                rsiCol.innerText = data.rsi.toFixed(1);
                
                tr.querySelector('.col-bs').innerText = data.bsRatio.toFixed(2);
                tr.querySelector('.col-score').innerHTML = `<span class="score ${scoreClass}">${data.score}/4</span>`;
            });
            
            document.getElementById('status-text').innerText = `Radar Aktif: ${sorted.length} Koin`;
        }

        fetchCoins();
    </script>
</body>
</html>
